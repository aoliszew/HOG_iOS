name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate event content
        run: python3 tools/validate_events.py

  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate project
        run: |
          brew install xcodegen
          xcodegen generate
      - name: Build for Simulator
        run: |
          xcodebuild -project HeartOfGold.xcodeproj \
            -scheme HeartOfGold \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
